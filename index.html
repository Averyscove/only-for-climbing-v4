<meta name="mobile-web-app-capable" content="yes">

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: radial-gradient(120% 80% at 50% 0%, #1a1714 0%, #0f0d0b 60%, #0a0908 100%);
    font-family: Inter, system-ui, sans-serif; color: #e2d9c8;
    -webkit-font-smoothing: antialiased;
    overflow: hidden; overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #root { width: 100%; height: 100%; }
  /* On phones / standalone PWAs, lock html+body to the actual visible viewport.
     Prevents iOS from leaving a band of cream paper below the tab bar. */
  @media (max-width: 600px), (display-mode: standalone) {
    html, body, #root { position: fixed; inset: 0; height: 100%; width: 100%; }
  }

  /* Stage layout */
  .stage {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 24px 24px 96px;
  }
  .stage-head {
    width: 100%; max-width: 920px; display: flex; align-items: center; justify-content: space-between;
    padding: 4px 8px 18px;
  }
  .stage-title {
    font-family: 'Archivo Black', Inter, sans-serif; letter-spacing: -0.5px; text-transform: uppercase;
    font-size: 18px; line-height: 1; color: #ece4d6;
  }
  .stage-title .dot { color: #e85d2a; }
  .stage-sub {
    font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px; letter-spacing: 1.5px;
    color: #9a907f; text-transform: uppercase; font-weight: 700;
  }
  .stage-screen-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: #9a907f; padding: 4px 10px; border: 1px solid #2c2823; background: rgba(28,24,20,0.6); font-weight: 700;
  }

  .device-wrap {
    transform-origin: top center;
    transition: transform 220ms ease;
  }
  /* On phones: hide the stage chrome, fill the viewport with the device frame */
  @media (max-width: 600px) {
    .stage { padding: 0; height: 100dvh; justify-content: stretch; }
    .stage-head { display: none; }
    .device-wrap { width: 100vw; height: 100dvh; display: flex; align-items: stretch; justify-content: center; }
    .device-wrap > * {
      width: 100vw !important; height: 100dvh !important;
      border-radius: 0 !important; box-shadow: none !important;
    }
    /* Hide the fake iOS chrome — the user's real phone shows their own */
    .device-wrap [data-ios="status"],
    .device-wrap [data-ios="island"],
    .device-wrap [data-ios="home"] { display: none !important; }
    /* Each screen pushed content down 54px to clear the fake status bar. */
    .device-wrap div[style*="top: 54px"] {
      top: env(safe-area-inset-top, 12px) !important;
    }
    /* Tab bar — flush to the bottom edge with minimal padding. */
    .uc-tabbar {
      padding-bottom: 4px !important;
      padding-top: 6px !important;
    }
    /* Each screen reserves bottom: 80px for the tab bar; with the new compact bar that left a cream gap. */
    .device-wrap div[style*="bottom: 80px"] {
      bottom: 56px !important;
    }
    .hint { bottom: max(20px, env(safe-area-inset-bottom)); }
  }
  /* PWA / standalone (Add-to-Home-Screen on iOS): always full bleed */
  @media (display-mode: standalone) {
    .stage { padding: 0; height: 100dvh; justify-content: stretch; }
    .stage-head { display: none; }
    .device-wrap { width: 100vw; height: 100dvh; display: flex; align-items: stretch; justify-content: center; }
    .device-wrap > * {
      width: 100vw !important; height: 100dvh !important;
      border-radius: 0 !important; box-shadow: none !important;
    }
    .device-wrap [data-ios="status"],
    .device-wrap [data-ios="island"],
    .device-wrap [data-ios="home"] { display: none !important; }
    .device-wrap div[style*="top: 54px"] {
      top: env(safe-area-inset-top, 12px) !important;
    }
    .uc-tabbar {
      padding-bottom: 4px !important;
      padding-top: 6px !important;
    }
    .device-wrap div[style*="bottom: 80px"] {
      bottom: 56px !important;
    }
  }

  /* Screen picker drawer */
  .picker-overlay {
    position: fixed; inset: 0; z-index: 70; background: rgba(8,7,6,0.7); backdrop-filter: blur(6px);
    opacity: 0; pointer-events: none; transition: opacity 200ms;
  }
  .picker-overlay.open { opacity: 1; pointer-events: auto; }
  .picker {
    position: fixed; right: 0; top: 0; bottom: 0; z-index: 75; width: min(380px, 92vw);
    background: #ece4d6; color: #13110e;
    box-shadow: -20px 0 60px rgba(0,0,0,0.5);
    transform: translateX(100%); transition: transform 260ms cubic-bezier(0.2, 0.8, 0.2, 1);
    display: flex; flex-direction: column;
  }
  .picker.open { transform: translateX(0); }
  .picker-head { padding: 18px 20px 10px; border-bottom: 1px solid #bfb4a0; display: flex; align-items: center; justify-content: space-between; }
  .picker-head .t { font-family: 'Archivo Black', Inter, sans-serif; font-size: 18px; letter-spacing: -0.4px; text-transform: uppercase; }
  .picker-head .x {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 800; letter-spacing: 1.5px;
    cursor: pointer; padding: 6px 10px; border: 1.5px solid #1a1714; background: transparent;
  }
  .picker-list { overflow-y: auto; padding: 10px 14px 24px; }
  .picker-section { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 2px; color: #5e564b; text-transform: uppercase; font-weight: 800; padding: 14px 6px 6px; }
  .picker-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 10px;
    border: 1px solid transparent;
    cursor: pointer;
    border-radius: 2px;
  }
  .picker-row:hover { background: #f6efe1; border-color: #bfb4a0; }
  .picker-row.active { background: #13110e; color: #fff; }
  .picker-row.active .num { background: #e85d2a; color: #fff; border-color: #e85d2a; }
  .picker-row .num {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 800; letter-spacing: 0.5px;
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    border: 1.5px solid #1a1714; flex-shrink: 0;
  }
  .picker-row .meta .t { font-family: 'Archivo Black', Inter, sans-serif; font-size: 13px; letter-spacing: -0.2px; text-transform: uppercase; }
  .picker-row .meta .s { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.5px; opacity: 0.7; text-transform: uppercase; font-weight: 700; }

  /* Hint pill */
  .hint {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 24px; z-index: 60;
    padding: 10px 14px;
    background: rgba(28,24,20,0.85); color: #ece4d6;
    border: 1px solid #2c2823;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase;
    backdrop-filter: blur(8px);
    pointer-events: none;
    opacity: 0;
    transition: opacity 280ms ease;
  }
  .hint.show { opacity: 1; }
</style>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const PHONE_W = 390;
const PHONE_H = 844;

// Screen catalog — order = picker order. `params` holds last-used routing args.
const SCREENS = [
  { id: 'onboarding',  no: '01', label: 'Onboarding',     sub: 'Find your crew',           dark: true,  group: 'CORE',   render: () => <HFOnboardingScreen /> },
  { id: 'feed',        no: '02', label: 'Feed',           sub: 'Hero send · stories',      dark: false, group: 'CORE',   render: () => <HFFeedScreen /> },
  { id: 'story',       no: '03', label: 'Story Viewer',   sub: 'Live · stickers',          dark: true,  group: 'CORE',   render: () => <HFStoryView /> },
  { id: 'composer',    no: '04', label: 'Log a Send',     sub: 'Composer · really logs',   dark: true,  group: 'CORE',   render: () => <HFComposerScreen /> },
  { id: 'me',          no: '05', label: 'Me · Hub',       sub: 'Profile / projects / etc.',dark: false, group: 'CORE',   render: () => <HFMeHubScreen /> },
  { id: 'profile',     no: '05a',label: 'My Profile',     sub: 'Stats · pyramid · sends',  dark: false, group: 'CORE',   render: () => <HFProfileScreen /> },
  { id: 'search',      no: '06', label: 'Search',         sub: 'People · spots · tags',    dark: false, group: 'SOCIAL', render: () => <HFSearchScreen /> },
  { id: 'events',      no: '07', label: 'Discover',       sub: 'Events / map / gyms',      dark: false, group: 'SOCIAL', render: () => <HFEventsScreen /> },
  { id: 'eventDetail', no: '07a',label: 'Event Detail',   sub: 'RSVP · attendees',         dark: false, group: 'SOCIAL', render: (p) => <HFEventDetailScreen eventId={p.eventId || 'e3'} /> },
  { id: 'plan',        no: '08', label: 'Plan a Climb',   sub: 'New event form',           dark: false, group: 'SOCIAL', render: () => <HFPlanScreen /> },
  { id: 'map',         no: '09', label: 'Map',            sub: 'Nearby gyms',              dark: false, group: 'SOCIAL', render: () => <HFMapScreen /> },
  { id: 'gymDetail',   no: '09a',label: 'Gym Detail',     sub: 'Routes · friends · hours', dark: false, group: 'SOCIAL', render: (p) => <HFGymDetailScreen gymId={p.gymId || 'BP'} /> },
  { id: 'chats',       no: '10', label: 'Group Chats',    sub: 'Inbox',                    dark: false, group: 'SOCIAL', render: () => <HFChatListScreen /> },
  { id: 'thread',      no: '10a',label: 'Chat Thread',    sub: 'Send a real message',      dark: false, group: 'SOCIAL', render: (p) => <HFGroupChatScreen chatId={p.chatId || 'c1'} /> },
  { id: 'notifications',no:'11', label: 'Notifications',  sub: 'New + earlier',            dark: false, group: 'SOCIAL', render: () => <HFNotificationsScreen /> },
  { id: 'friend',      no: '12', label: 'Friend Profile', sub: 'Follow / message',         dark: false, group: 'SOCIAL', render: (p) => <HFFriendProfileScreen userId={p.userId || 'mara'} /> },
  { id: 'projects',    no: '13', label: 'Projects',       sub: 'Active · attempts log',    dark: false, group: 'ME',     render: () => <HFProjectsScreen /> },
  { id: 'training',    no: '14', label: 'Training Plan',  sub: 'Weekly schedule',          dark: false, group: 'ME',     render: () => <HFTrainingScreen /> },
  { id: 'gear',        no: '15', label: 'Gear Locker',    sub: 'Shoes · chalk · tape',     dark: false, group: 'ME',     render: () => <HFGearScreen /> },
  { id: 'achievements',no: '16', label: 'Achievements',   sub: 'Earned + locked',          dark: false, group: 'ME',     render: () => <HFAchievementsScreen /> },
  { id: 'leaderboard', no: '17', label: 'Leaderboard',    sub: 'Crew + global',            dark: false, group: 'ME',     render: () => <HFLeaderboardScreen /> },
  { id: 'recap',       no: '18', label: 'Weekly Recap',   sub: 'Last 7 days',              dark: false, group: 'ME',     render: () => <HFRecapScreen /> },
  { id: 'settings',    no: '19', label: 'Settings',       sub: 'Privacy · notifications',  dark: false, group: 'ME',     render: () => <HFSettingsScreen /> },
  { id: 'editProfile', no: '19a',label: 'Edit Profile',   sub: 'Name · bio · city',        dark: false, group: 'ME',     render: () => <HFEditProfileScreen /> },
  { id: 'shareA',      no: 'A',  label: 'Share · Stamped',sub: 'Certificate',              dark: false, group: 'SHARE',  render: () => <ShareCardArtboard><HFShareA /></ShareCardArtboard> },
  { id: 'shareB',      no: 'B',  label: 'Share · Editorial', sub: 'Full bleed',            dark: true,  group: 'SHARE',  render: () => <ShareCardArtboard><HFShareB /></ShareCardArtboard> },
  { id: 'shareC',      no: 'C',  label: 'Share · Newspaper', sub: 'Broadsheet',            dark: false, group: 'SHARE',  render: () => <ShareCardArtboard><HFShareC /></ShareCardArtboard> },
  // ─── v4 additions ───
  { id: 'kilter',      no: 'K',  label: 'Board · Kilter', sub: 'Companion · climb library',dark: true,  group: 'BOARD',  render: () => <HFKilterScreen /> },
];

// Wraps a 360×720 share card so it sits visually on the same paper background as a phone-sized canvas.
function ShareCardArtboard({ children }) {
  const back = () => window.UC && window.UC.navigate('feed');
  return (
    <div style={{
      width: PHONE_W, height: PHONE_H,
      background: HF.paper,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      position: 'relative',
    }}>
      {/* Top bar with back affordance — always visible, sits above the card. */}
      <div style={{
        position: 'absolute', top: 54, left: 14, right: 14, zIndex: 10,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <button onClick={back} style={{
          display: 'inline-flex', alignItems: 'center', gap: 6,
          padding: '8px 12px',
          background: HF.ink, color: '#fff',
          border: 'none', cursor: 'pointer',
          fontFamily: HF.mono, fontSize: 10, fontWeight: 800, letterSpacing: 1.5,
          textTransform: 'uppercase',
          boxShadow: `2px 2px 0 ${HF.accent}`,
        }}>{HFIcon.back(12, '#fff')} BACK</button>
        <span style={{
          fontFamily: HF.mono, fontSize: 9, fontWeight: 800, letterSpacing: 1.5,
          padding: '6px 9px', background: HF.accent, color: '#fff',
          textTransform: 'uppercase',
        }}>SHARE PREVIEW</span>
      </div>
      <div style={{ boxShadow: '0 24px 48px rgba(0,0,0,0.25), 0 8px 16px rgba(0,0,0,0.18)' }}>
        {children}
      </div>
      {/* Bottom hint */}
      <div style={{
        position: 'absolute', bottom: 28, left: 0, right: 0, textAlign: 'center', zIndex: 10,
        fontFamily: HF.mono, fontSize: 9, letterSpacing: 1.5, color: HF.ink3, fontWeight: 700,
        textTransform: 'uppercase',
      }}>TAP BACK · OR USE THE SCREENS PICKER</div>
    </div>
  );
}

function ScreenPicker({ open, onClose, current, onPick }) {
  const groups = ['CORE', 'SOCIAL', 'ME', 'BOARD', 'SHARE'];
  const titles = { CORE: '— Core flow —', SOCIAL: '— Social · plan —', ME: '— Me · profile · stats —', BOARD: '— Training board —', SHARE: '— Hero share cards —' };
  return (
    <>
      <div className={'picker-overlay' + (open ? ' open' : '')} onClick={onClose} />
      <aside className={'picker' + (open ? ' open' : '')} aria-hidden={!open}>
        <div className="picker-head">
          <div className="t">SCREENS · {SCREENS.length}</div>
          <button className="x" onClick={onClose}>CLOSE ✕</button>
        </div>
        <div className="picker-list">
          {groups.map(g => (
            <div key={g}>
              <div className="picker-section">{titles[g]}</div>
              {SCREENS.filter(s => s.group === g).map(s => (
                <div
                  key={s.id}
                  className={'picker-row' + (current === s.id ? ' active' : '')}
                  onClick={() => { onPick(s.id); onClose(); }}
                >
                  <div className="num">{s.no}</div>
                  <div className="meta">
                    <div className="t">{s.label}</div>
                    <div className="s">{s.sub}</div>
                  </div>
                </div>
              ))}
            </div>
          ))}
        </div>
      </aside>
    </>
  );
}

function App() {
  const [screen, setScreen] = React.useState(() => {
    const fromHash = (window.location.hash || '').replace('#', '');
    return SCREENS.some(s => s.id === fromHash) ? fromHash : 'onboarding';
  });
  const [params, setParams] = React.useState({});
  const [picker, setPicker] = React.useState(false);
  const [hint, setHint] = React.useState(true);
  const [toast, setToast] = React.useState(null);
  const [sheet, setSheet] = React.useState(null);

  // Expose navigation + fx primitives to the design components via window.UC
  React.useEffect(() => {
    window.UC = window.UC || {};
    window.UC.navigate = (s, p = {}) => {
      if (SCREENS.some(x => x.id === s)) {
        setScreen(s);
        if (p && Object.keys(p).length) setParams(prev => ({ ...prev, ...p }));
      }
    };
    window.UC.openPicker = () => setPicker(true);
    let toastTimer;
    window.UC.toast = (msg, opts = {}) => {
      clearTimeout(toastTimer);
      setToast({ msg, accent: !!opts.accent, key: Date.now() });
      toastTimer = setTimeout(() => setToast(null), opts.ms || 1700);
    };
    window.UC.openComments = (postId) => setSheet({ kind: 'comments', postId });
    window.UC.closeSheet  = () => setSheet(null);
    window.UC.openProfile = (userId) => { setParams(p => ({ ...p, userId })); setScreen(userId === 'you' ? 'profile' : 'friend'); };
    window.UC.openGym     = (gymId)  => { setParams(p => ({ ...p, gymId  })); setScreen('gymDetail'); };
    window.UC.openEvent   = (eventId)=> { setParams(p => ({ ...p, eventId})); setScreen('eventDetail'); };
    window.UC.openThread  = (chatId) => { setParams(p => ({ ...p, chatId })); setScreen('thread'); };
  }, []);

  // Keep URL hash synced for deep links and back/forward.
  React.useEffect(() => {
    if (window.location.hash !== '#' + screen) {
      window.history.replaceState(null, '', '#' + screen);
    }
  }, [screen]);

  // Hash → state on back/forward.
  React.useEffect(() => {
    const onHash = () => {
      const s = (window.location.hash || '').replace('#', '');
      if (SCREENS.some(x => x.id === s)) setScreen(s);
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  // Hide hint after a moment.
  React.useEffect(() => {
    const t = setTimeout(() => setHint(false), 4500);
    return () => clearTimeout(t);
  }, []);

  // Keyboard: ←/→ to flip screens, P to open picker.
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
        const idx = SCREENS.findIndex(s => s.id === screen);
        if (idx === -1) return;
        const next = e.key === 'ArrowRight'
          ? SCREENS[(idx + 1) % SCREENS.length].id
          : SCREENS[(idx - 1 + SCREENS.length) % SCREENS.length].id;
        setScreen(next);
      } else if (e.key === 'p' || e.key === 'P') {
        setPicker(p => !p);
      } else if (e.key === 'Escape') {
        setPicker(false);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [screen]);

  const current = SCREENS.find(s => s.id === screen) || SCREENS[0];

  return (
    <div className="stage">
      <div className="stage-head">
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div>
            <div className="stage-title">ONLY FOR CLIMBING<span className="dot">.</span></div>
            <div className="stage-sub" style={{ marginTop: 6 }}>V4 · LIVE STATE · 28 SCREENS · IOS · BOARD</div>
          </div>
          <span style={{
            fontFamily: "'JetBrains Mono', monospace", fontSize: 10, fontWeight: 800, letterSpacing: 1.4,
            padding: '5px 9px', background: '#e85d2a', color: '#fff', textTransform: 'uppercase',
            boxShadow: '2px 2px 0 #c43c0c',
          }}>V4</span>
          <button onClick={() => { OFC.clearAllAndReseed(); window.UC.toast('RESET TO SEED', { accent: true }); }} style={{
            fontFamily: "'JetBrains Mono', monospace", fontSize: 9, fontWeight: 800, letterSpacing: 1.2,
            padding: '5px 8px', background: 'transparent', color: '#9a907f',
            border: '1px solid #2c2823', cursor: 'pointer', textTransform: 'uppercase',
          }}>RESET DATA</button>
        </div>
        <div className="stage-screen-label">{current.no} · {current.label.toUpperCase()}</div>
      </div>

      <div className="device-wrap">
        <IOSDevice width={PHONE_W} height={PHONE_H} dark={current.dark}>
          <div style={{ position: 'relative', width: '100%', height: '100%' }}>
            {current.render(params)}
            {toast && <HFToast key={toast.key} msg={toast.msg} accent={toast.accent} />}
            <HFBottomSheet
              open={!!sheet}
              onClose={() => setSheet(null)}
              title={sheet && sheet.kind === 'comments' ? 'COMMENTS' : 'SHEET'}
              height={0.78}
            >
              {sheet && sheet.kind === 'comments' && <HFCommentSheet postId={sheet.postId} />}
            </HFBottomSheet>
          </div>
        </IOSDevice>
      </div>

      <ScreenPicker
        open={picker}
        onClose={() => setPicker(false)}
        current={screen}
        onPick={setScreen}
      />

      <div className={'hint' + (hint ? ' show' : '')}>
        V4 · 28 SCREENS · KILTER · REAL MAP · TRY ANYTHING
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
